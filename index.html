<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard Chinese</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Segoe UI, sans-serif;
}
.app{
    width:420px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    color:white;
}
.progress-container{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    margin-bottom:20px;
    overflow:hidden;
}
.progress-bar{
    height:100%;
    width:0%;
    background:#00f5d4;
    transition:0.3s;
}
.card{
    height:220px;
    background:white;
    color:#333;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:55px;
    font-weight:bold;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:20px;
    position:relative;
}
.speaker{
    position:absolute;
    bottom:15px;
    right:20px;
    font-size:26px;
    cursor:pointer;
}
.info{
    text-align:center;
    min-height:70px;
    font-size:18px;
    margin-bottom:15px;
}
.controls{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}
button{
    border:none;
    border-radius:50px;
    padding:10px 18px;
    font-size:16px;
    cursor:pointer;
}
.nav{ background:white; color:#333; }
.main{ width:100%; background:#00f5d4; font-weight:bold; }
</style>
</head>

<body>
<div class="app">

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="card">
<div id="hanziBox">开始</div>
<div class="speaker" onclick="speakWord()">🔊</div>
</div>

<div class="info" id="infoBox">
Nhấn "Hiện đáp án"
</div>

<div class="controls">
<button class="nav" onclick="prevWord()">⬅</button>
<button class="nav" onclick="nextWord()">➡</button>
</div>

<button class="main" onclick="showAnswer()">Hiện đáp án</button>

</div>

<script>

let vocabulary=[

// ===== BÀI 13 =====
{hanzi:"头",pinyin:"tóu",meaning:"đầu"},
{hanzi:"疼",pinyin:"téng",meaning:"đau"},
{hanzi:"舒服",pinyin:"shūfu",meaning:"thoải mái"},
{hanzi:"流",pinyin:"liú",meaning:"chảy"},
{hanzi:"鼻涕",pinyin:"bítì",meaning:"nước mũi"},
{hanzi:"发烧",pinyin:"fāshāo",meaning:"sốt"},
{hanzi:"让",pinyin:"ràng",meaning:"để, bảo, khiến"},
{hanzi:"检查",pinyin:"jiǎnchá",meaning:"kiểm tra"},
{hanzi:"病",pinyin:"bìng",meaning:"bệnh"},
{hanzi:"看病",pinyin:"kàn bìng",meaning:"khám bệnh"},
{hanzi:"严重",pinyin:"yánzhòng",meaning:"nghiêm trọng"},
{hanzi:"感冒",pinyin:"gǎnmào",meaning:"cảm cúm"},
{hanzi:"护士",pinyin:"hùshi",meaning:"y tá"},
{hanzi:"打针",pinyin:"dǎ zhēn",meaning:"tiêm"},
{hanzi:"开",pinyin:"kāi",meaning:"mở, kê (thuốc)"},
{hanzi:"药",pinyin:"yào",meaning:"thuốc"},
{hanzi:"次",pinyin:"cì",meaning:"lần"},
{hanzi:"片",pinyin:"piàn",meaning:"viên (thuốc)"},
{hanzi:"休息",pinyin:"xiūxi",meaning:"nghỉ ngơi"},

// ===== TỪ VIẾT TAY =====
{hanzi:"谁",pinyin:"shéi",meaning:"ai"},
{hanzi:"手",pinyin:"shǒu",meaning:"tay"},
{hanzi:"健康",pinyin:"jiànkāng",meaning:"sức khỏe"}

];

let shuffled=[...vocabulary].sort(()=>Math.random()-0.5);
let index=0;
let answerShown=false;

function showWord(){
let w=shuffled[index];
document.getElementById("hanziBox").innerText=w.hanzi;
document.getElementById("infoBox").innerText="Nhấn \"Hiện đáp án\"";
answerShown=false;

let percent=Math.round(((index+1)/shuffled.length)*100);
document.getElementById("progressBar").style.width=percent+"%";
}

function showAnswer(){
if(answerShown) return;
let w=shuffled[index];
document.getElementById("infoBox").innerHTML="<b>"+w.pinyin+"</b><br>"+w.meaning;
answerShown=true;
speakWord();
}

function nextWord(){ if(index<shuffled.length-1){ index++; showWord(); } }
function prevWord(){ if(index>0){ index--; showWord(); } }

function speakWord(){
speechSynthesis.cancel();
let w=shuffled[index];
let u=new SpeechSynthesisUtterance(w.hanzi);
u.lang="zh-CN";
speechSynthesis.speak(u);
}

showWord();

</script>
</body>
</html>
