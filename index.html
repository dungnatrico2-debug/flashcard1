<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard Chinese</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f6e2a8,#eac96c);
    font-family:Arial;
}

.window{
    width:1000px;
    background:#ddd;
    border:4px solid #333;
    box-shadow:10px 10px 0px #ff8c42;
    padding:20px;
}

.progress-container{
    width:100%;
    height:20px;
    background:#bbb;
    margin-bottom:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#ffb400;
    text-align:center;
    font-size:12px;
    font-weight:bold;
}

.content{
    display:flex;
    gap:20px;
}

.left{
    flex:1;
    background:#e8c38b;
    border:4px solid #999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:350px;
}

.hanzi{
    font-size:110px;
}

.speaker{
    margin-top:20px;
    font-size:40px;
    cursor:pointer;
}

.right{
    flex:1;
    background:#eee;
    border:4px solid #999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    font-size:28px;
    text-align:center;
}

button.nav{
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    background:#ffb400;
    font-size:30px;
    cursor:pointer;
    position:absolute;
    top:40%;
}

.prev{ left:20px; }
.next{ right:20px; }

button.main{
    margin-top:30px;
    padding:12px 40px;
    border:none;
    background:#ffb400;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="window">

<div class="progress-container">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="content">

<div class="left">
<div class="hanzi" id="hanziBox">开始</div>
<div class="speaker" onclick="speakWord()">🔊</div>
</div>

<div class="right">

<button class="nav prev" onclick="prevWord()"><</button>
<button class="nav next" onclick="nextWord()">></button>

<div id="infoBox">Nhấn "Hiện đáp án"</div>

<button class="main" onclick="showAnswer()">Hiện đáp án</button>

let shuffled=[...vocabulary].sort(()=>Math.random()-0.5);
let index=0;
let answerShown=false;

function showWord(){
let w=shuffled[index];
document.getElementById("hanziBox").innerText=w.hanzi;
document.getElementById("infoBox").innerText="Nhấn 'Hiện đáp án'";
answerShown=false;

let percent=Math.round(((index+1)/shuffled.length)*100);
let bar=document.getElementById("progressBar");
bar.style.width=percent+"%";
bar.innerText=percent+"%";
}

function showAnswer(){
if(answerShown) return;
let w=shuffled[index];
document.getElementById("infoBox").innerHTML="<b>"+w.pinyin+"</b><br>"+w.meaning;
answerShown=true;
speakWord(); // 🔥 tự động đọc
}

function nextWord(){
if(index<shuffled.length-1){ index++; showWord(); }
}

function prevWord(){
if(index>0){ index--; showWord(); }
}

function speakWord(){
speechSynthesis.cancel();
let w=shuffled[index];
let u=new SpeechSynthesisUtterance(w.hanzi);
u.lang="zh-CN";
speechSynthesis.speak(u);
}

showWord();

</script>
